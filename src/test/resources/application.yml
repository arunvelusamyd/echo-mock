# Test-only configuration (never packaged into the WAR). Mirrors the runtime
# settings in ./config/application.yml so @SpringBootTest behaves like production.
server:
  port: ${MOCK_PORT:8080}

spring:
  application:
    name: echo-mock
  web:
    resources:
      add-mappings: false
  mvc:
    throw-exception-if-no-handler-found: true

mock:
  # Tests run with the module root as the working directory, so this resolves to
  # the project's config/mocks.yml (3 bundled definitions).
  config-path: ${MOCK_CONFIG_PATH:config/mocks.yml}

logging:
  level:
    com.example.echomock: INFO
