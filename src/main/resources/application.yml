server:
  port: ${MOCK_PORT:8080}

spring:
  application:
    name: echo-mock
  # Let the catch-all controller own every path (incl. "/").
  web:
    resources:
      add-mappings: false
  mvc:
    throw-exception-if-no-handler-found: true

mock:
  # External config file, editable without rebuilding. Falls back to the bundled
  # classpath mocks.yml if this file is not present. Override with --mock.config-path=...
  config-path: ${MOCK_CONFIG_PATH:config/mocks.yml}

logging:
  level:
    com.example.echomock: INFO
